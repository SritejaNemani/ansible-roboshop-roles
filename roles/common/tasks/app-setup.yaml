- name: create a system user roboshop
  ansible.builtin.user: 
    name: roboshop 
    system: true 
    home: /app 
    shell: /sbin/nologin  
    comment: "Roboshop system user"

- name: delete the /app directory
  ansible.builtin.file:
    path: /app
    state: absent


- name: create app directory 
  ansible.builtin.file:
    path: /app
    state: directory

- name: delete catyalogue zip filke
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent

- name: Download {{ component }} 
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip

- name: Unzip the cod
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes